<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./public/css/style.css">
</head>
<body>
    <!--NavBar-->
    <nav class="navbar navbar-expand-lg shadow bg-white">
        <div class="container">
            <!-- link dentro un h1 -->
            <a class="navbar-brand d-flex align-items-center" href="./index.html"><img class="me-3" src="./public/img/logo.png" alt=""><span class="fw-semibold fs-3 text-primary">Presto.it</span></a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="./index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./annunci.html">Annunci</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            Categorie
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Action</a></li>
                            <li><a class="dropdown-item" href="#">Another action</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="#">Something else here</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <!--NavBar-->

    <!--Selection Form-->
    <div class="container p-4 bg-primary">
        <form  id="searchForm" class="row g-4">
            <div class="col-12 col-md-6">
                <div class="form-floating">
                    <input type="text" class="form-control" id="searchInput" placeholder="Cerca">
                    <label for="searchInput">Cerca</label>
                </div>
            </div>
            <div class="col-12 col-md-6">
                <div class="form-floating">
                    <select class="form-select" id="categorySelect">
                        <option selected value="Tutti gli annunci">Tutti gli annunci</option>
                        </select>
                    <label for="categorySelect">Filtra per categorie</label>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <div class="form-floating">
                    <input type="number" class="form-control" id="minPriceInput" placeholder="Min Price" min="0">
                    <label for="minPriceInput">Min Price</label>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <div class="form-floating">
                    <input type="number" class="form-control" id="maxPriceInput" placeholder="Min Price" min="0">
                    <label for="maxPriceInput">Max Price</label>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <div class="form-floating">
                    <select class="form-select" id="sortSelect">
                        <option selected>nessun ordine</option>
                        <!--<option value="">Dal piu recente</option>
                        <option value="">Dal piu vecchio</option>-->
                        <option value="ascByPrice">Dal meno costoso</option>
                        <option value="descByPrice">Dal piu costoso</option>
                        <option value="ascByAlpha">Da A alla Z</option>
                        <option value="descByAlpha">Da Z alla A</option>
                    </select>
                    <label for="floatingSelect">Ordina Annunci</label>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <button type="submit" class="btn btn-accent w-100 h-100 text-white">Submit</button>
            </div>
        </form>
    </div>
    <!--Selection Form-->

    <!-- Card Auto-->
    <div class="container p-4">
        <div id="announcementsRow" class="row g-4"></div>
    </div>
    <!-- Card Auto-->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="./public/js/annunci.js"></script>
</body>
</html>
